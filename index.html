<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyTutor lesson games</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Avenir Next", "Gill Sans", sans-serif;
      background: linear-gradient(160deg, #f9f3e8 0%, #efe6d6 100%);
      color: #18222f;
    }

    main {
      width: min(760px, calc(100% - 2rem));
      padding: 2rem;
      border-radius: 28px;
      background: rgba(255, 252, 246, 0.9);
      border: 1px solid rgba(24, 34, 47, 0.12);
      box-shadow: 0 18px 48px rgba(46, 35, 22, 0.12);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 3.4rem);
      line-height: 0.95;
    }

    p {
      line-height: 1.6;
      color: #5f6b7a;
    }

    a {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.85rem 1.05rem;
      border-radius: 14px;
      text-decoration: none;
      background: linear-gradient(135deg, #0f766e, #0b5f59);
      color: white;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>MyTutor lesson games</h1>
    <p>
      This public site contains browser-based lesson activities only.
      It intentionally excludes student records, private notes, and internal documents.
    </p>
    <a href="./index-games.html">Open the games index</a>
  </main>
</body>
</html>
